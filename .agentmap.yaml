meta:
  project: agent-resources
  version: 1
  updated: "2026-02-27"
  stack:
    - claude-code
    - bash
    - markdown

tree:
  marketplace.json: "plugin registry, lists available plugins"
  CLAUDE.md: "project conventions and rules"
  plugins/:
    agentmap/:
      plugin.json: "plugin metadata: skills list"
      install.sh: "copies skills + docs to ~/.claude/"
      example.agentmap.yaml: "reference agentmap for other projects"
      skills/:
        agentmap-generate/: "skill: generate .agentmap.yaml"
        agentmap-read/: "skill: consume .agentmap.yaml"
    jinglemansweep/:
      plugin.json: "plugin metadata: skills + agents lists"
      install.sh: "copies skills + agents to ~/.claude/"
      agents/: "planner + role-based agent definitions (jms-*)"
      skills/:
        jms-init/: "skill: init .plans directory"
        jms-phase-new/: "skill: create new plan phase"
        jms-plan/: "skill: generate plan from prompt"
        jms-review/: "skill: review plan issues"
        jms-taskify/: "skill: convert plan to task list"
        jms-execute/: "skill: execute task list"
        jms-git-push/: "skill: automate branch creation, PR, and auto-merge"
  .plans/: "planning phase artifacts (generated)"
  .github/workflows/: "CI: pre-commit hooks"

conventions:
  - plugins under plugins/<name>/: plugin.json, install.sh, skills/, agents/
  - one SKILL.md per skill directory: self-contained definition
  - agents are single markdown files: in agents/ directory
  - jms- prefix for jinglemansweep plugin: agentmap- prefix for agentmap plugin
  - install.sh copies to ~/.claude/: CLAUDE_DIR overridable

meta:
  project: agent-resources
  version: 1
  updated: "2026-03-01"
  stack:
    - claude-code
    - bash
    - markdown

tree:
  marketplace.json: "plugin registry, lists available plugins"
  CLAUDE.md: "project conventions and rules"
  plugins/:
    agentmap/:
      plugin.json: "plugin metadata: skills list"
      install.sh: "copies skills + docs to ~/.claude/"
      example.agentmap.yaml: "reference agentmap for other projects"
      skills/:
        agentmap-generate/: "skill: generate .agentmap.yaml"
        agentmap-init/: "skill: check for and guide .agentmap.yaml setup"
        agentmap-read/: "skill: consume .agentmap.yaml"
    jinglemansweep/:
      plugin.json: "plugin metadata: skills + agents lists (v0.4.0)"
      install.sh: "copies skills + agents to ~/.claude/, cleans old artefacts"
      skills/:
        jms-git/: "skill: structured GitHub operations via gh CLI"
        jms-role-python/: "domain skill: Python conventions and quality gates"
        jms-role-nodejs/: "domain skill: Node.js/TypeScript conventions"
        jms-role-frontend/: "domain skill: frontend/UI conventions"
        jms-role-devops/: "domain skill: infrastructure and CI/CD conventions"
        jms-role-docs/: "domain skill: documentation conventions"
        jms-role-agent-skills/: "domain skill: skill authoring conventions"
    jplan/:
      plugin.json: "plugin metadata: skills + agents lists"
      install.sh: "copies skills + agents to ~/.claude/"
      agents/:
        jp-developer.md: "agent: general-purpose developer with domain skill routing"
      skills/:
        jp-plan-init/: "skill: init .plans directory"
        jp-plan-new/: "skill: create new plan phase"
        jp-plan-prd/: "skill: generate PRD from prompt"
        jp-plan-prd-review/: "skill: review PRD against prompt"
        jp-plan-task-breakdown/: "skill: convert PRD to task list"
        jp-plan-task-review/: "skill: validate task list against PRD"
        jp-plan-execute/: "skill: execute task list with review-fix loop"
        jp-plan-task-validate/: "skill: run post-task validation checks"
        jp-plan-code-review/: "skill: holistic code review"
        jp-plan-fix/: "skill: apply targeted fixes for review issues"
        jp-plan-summary/: "skill: generate final summary report"
        jp-plan-workflow/: "skill: end-to-end pipeline orchestration"
  .plans/: "planning phase artifacts (generated)"
  .github/workflows/: "CI: pre-commit hooks"

conventions:
  - plugins under plugins/<name>/: plugin.json, install.sh, skills/, agents/
  - one SKILL.md per skill directory: self-contained definition
  - agents are single markdown files: in agents/ directory
  - jms- prefix for jinglemansweep plugin: agentmap- prefix for agentmap plugin
  - jp- prefix for jplan plugin: jp-plan-* for planning pipeline skills
  - jms-role-* prefix for domain skills: jinglemansweep plugin
  - install.sh copies to ~/.claude/: CLAUDE_DIR overridable

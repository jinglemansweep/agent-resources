tasks:
  - id: "TASK-001"
    title: "Create jms-role-skills agent definition"
    description: >
      Create a new agent definition file at plugins/jinglemansweep/agents/jms-role-skills.md
      that serves as the role agent for skill-authoring tasks in the jms-execute pipeline.

      The file must follow the same Markdown structure and YAML frontmatter pattern as the
      existing jms-role-* agents (e.g. jms-role-docs.md). The frontmatter must include
      name: jms-role-skills and a description field.

      The agent body must instruct the implementing agent to:
      1. Read and follow the skill-creator skill's authoring guidance located at
         ~/.claude/plugins/marketplaces/anthropic-agent-skills/skills/skill-creator/SKILL.md
         when creating or modifying SKILL.md files. Specifically, the "Skill Writing Guide"
         section (anatomy, progressive disclosure, writing patterns, writing style).
      2. Adhere to the project's existing skill conventions as defined in CLAUDE.md: one
         SKILL.md per skill directory, YAML frontmatter with name and description fields,
         skills live under plugins/<plugin-name>/skills/<skill-name>/.
      3. Include Domain Expertise, Rules, Workflow, Quality Gates, and Constraints sections
         matching the pattern used by other jms-role-* agents.
      4. The Workflow section should describe: reading the skill-creator guidance, auditing
         existing skill files if modifying, writing/editing the SKILL.md following the
         skill-creator patterns, and verifying frontmatter and structure.
      5. The Constraints section must include the standard jms-role constraints (implement
         only given tasks, do not make git commits, do not refactor beyond task scope).
    requirements:
      - "REQ-002"
      - "REQ-005"
    dependencies: []
    suggested_role: "general"
    acceptance_criteria:
      - "File plugins/jinglemansweep/agents/jms-role-skills.md exists"
      - "YAML frontmatter contains name: jms-role-skills and a description field"
      - "Agent body references the skill-creator skill path ~/.claude/plugins/marketplaces/anthropic-agent-skills/skills/skill-creator/SKILL.md"
      - "Agent body instructs adherence to project skill conventions (one SKILL.md per directory, YAML frontmatter with name and description)"
      - "File structure matches the pattern of existing jms-role-* agents (frontmatter, heading, intro, Domain Expertise, Rules, Workflow, Quality Gates, Constraints sections)"
    estimated_complexity: "medium"
    files_affected:
      - "plugins/jinglemansweep/agents/jms-role-skills.md"


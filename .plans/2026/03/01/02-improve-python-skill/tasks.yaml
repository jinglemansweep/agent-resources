  - id: "TASK-001"
    title: "Add Python pattern and idiom sections to jms-role-python.md"
    description: |
      Edit `plugins/jinglemansweep/agents/jms-role-python.md` to add new sections
      covering idiomatic Python patterns derived from the external `python-patterns`
      skill. The file is currently 86 lines with a ~200-line budget, leaving roughly
      114 lines for new content. Each new section should average 10-12 lines using
      concise bullet-point directives (not lengthy code blocks).

      Add the following sections, placed between the existing "Recommended Packages"
      and "Domain Expertise" sections:

      1. **Core Principles** (REQ-001) — Three directives:
         - Readability first: prefer clear, obvious code over clever one-liners
         - Explicit over implicit: avoid hidden side effects and magic
         - EAFP: use try/except over pre-condition checks (Pythonic exception handling)

      2. **Type Hints** (REQ-002) — Directives covering:
         - Use built-in generics (`list[str]`, `dict[str, Any]`) for Python 3.10+
         - Use `Protocol` for structural/duck typing instead of ABC where possible
         - Use `TypeVar` for generic functions and type aliases for complex types

      3. **Error Handling** (REQ-003) — Directives covering:
         - Always catch specific exceptions, never bare `except`
         - Chain exceptions with `raise ... from e` to preserve tracebacks
         - Define custom exception hierarchies (base AppError with specific subclasses)

      4. **Context Managers** (REQ-004) — Directives covering:
         - Always use `with` statements for resource management (files, connections, locks)
         - Use `@contextmanager` from contextlib for simple cases
         - Use `__enter__`/`__exit__` class pattern for complex resource management

      5. **Comprehensions and Generators** (REQ-005) — Directives covering:
         - Prefer generator expressions over list comprehensions for large datasets
         - Expand comprehensions with multiple conditions to loops or named functions
         - Use generator functions (`yield`) for lazy iteration over large data

      6. **Decorators** (REQ-006) — Directives covering:
         - Always use `functools.wraps` on wrapper functions
         - Use decorator factories (nested def) for parameterized decorators
         - Use class-based decorators with `__call__` when state tracking is needed

      7. **Concurrency** (REQ-007) — Directives covering:
         - Use `ThreadPoolExecutor` for I/O-bound concurrency
         - Use `ProcessPoolExecutor` for CPU-bound parallelism
         - Use `asyncio` with `async/await` and `asyncio.gather` for async I/O

      8. **Performance** (REQ-008) — Directives covering:
         - Use `__slots__` on data-heavy classes for memory efficiency
         - Use `"".join()` instead of string concatenation in loops
         - Return generators instead of lists for large datasets

      9. **Anti-Patterns** (REQ-009) — A list of patterns to avoid with corrections:
         - Mutable default arguments → use `None` and create inside function
         - `type()` for type checking → use `isinstance()`
         - `== None` / `!= None` → use `is None` / `is not None`
         - `from module import *` → use explicit imports
         - Bare `except:` → catch specific exceptions

      Additionally, per the PRD review's optional enhancement, add 2-3 bullets about
      `NamedTuple` as an immutable alternative to dataclasses and `__post_init__`
      for dataclass validation to the existing Patterns section.

      Constraints:
      - Preserve all existing sections unchanged: frontmatter, Mandatory Requirements,
        New Projects, Existing Projects, Recommended Packages, Patterns, Domain Expertise,
        Workflow, Quality Gates, Constraints (REQ-010)
      - Keep total file length at approximately 200 lines (REQ-011)
      - Match existing style: `##` headers, dash-prefix bullets, **bold** key terms,
        no emojis, no admonition blocks (REQ-012)
      - No code blocks longer than 3-5 lines; prefer text directives

  - id: "TASK-005"
    title: "Create jms-git skill for GitHub operations"
    description: |
      Create a new skill at plugins/jinglemansweep/skills/jms-git/SKILL.md that provides a structured interface for common GitHub operations using the `gh` CLI. Use the openclaw GitHub skill (https://github.com/openclaw/openclaw/blob/main/skills/github/SKILL.md) as a reference for structure and coverage.

      The skill should cover:
        1. Pull Request management: list PRs, view PR details, create PRs, merge PRs, review PRs
        2. Issue management: list issues, create issues, close issues, view issue details
        3. CI/Workflow operations: view workflow run status, view run logs, re-run failed workflows
        4. GitHub API queries: generic `gh api` usage for operations not covered above

      The skill should NOT cover local git operations (commit, push, pull, branch, rebase, etc.) -- those are standard git usage.

      SKILL.md structure:
        - YAML frontmatter with name: jms-git, description, and allowed-tools: Bash
        - Description of when to use this skill (GitHub remote operations) and when NOT to use it (local git)
        - Sections for each operation category with `gh` CLI command examples
        - Guidelines for common patterns (e.g. using --json for machine-readable output)
    requirements:

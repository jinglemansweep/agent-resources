  - id: "TASK-013"
    title: "Create jms-developer agent with signal-based domain skill routing"
    description: |
      Create a new agent at plugins/jinglemansweep/agents/jms-developer.md that serves as the single implementation agent, replacing all jms-role-* agents.

      The agent definition should include:
        - YAML frontmatter with name: jms-developer, description: "General-purpose developer agent that delegates to domain-specific skills"
        - Base behaviour: the agent is a capable developer that follows general best practices (absorbing jms-role-general's content as the default behaviour)
        - Signal-based routing logic: a table mapping task signals (file extensions, framework keywords, file patterns) to domain skills:
            * Python signals (.py, pyproject.toml, pytest, django, flask, etc.) -> load jms-skill-python
            * Node.js signals (.js, .ts, package.json, node_modules, etc.) -> load jms-skill-nodejs
            * Frontend signals (.html, .css, .jsx, .tsx, .vue, .svelte, etc.) -> load jms-skill-frontend
            * DevOps signals (Dockerfile, .github/workflows, docker-compose, Makefile, .sh, etc.) -> load jms-skill-devops
            * Docs signals (.md, README, CHANGELOG, docs/, etc.) -> load jms-skill-docs
            * Skills signals (SKILL.md, skills/, agents/, skill-creator, etc.) -> load jms-skill-skills
        - Instructions for loading the selected domain skill: read the SKILL.md content and follow its conventions during implementation
        - Fallback: if no domain skill matches, proceed with general best practices (the base behaviour)
        - Support for multiple matching skills: if signals match multiple domains, load all matching skills

      The agent should be written so that it can be spawned via the Claude Code Task tool with subagent_type set to the appropriate agent type.

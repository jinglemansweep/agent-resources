  - id: "TASK-004"
    title: "Fix .plans directory detection to use git repository root"
    description: |
      Update all skills that reference the `.plans/` directory to resolve the path relative to the git repository root using `git rev-parse --show-toplevel`, rather than assuming `.plans/` exists relative to the current working directory.

      10 SKILL.md files reference `.plans`:
        - jms-plan-init (creates .plans)
        - jms-plan-phase-new (scans .plans)
        - jms-plan-prd (scans .plans)
        - jms-plan-prd-review (scans .plans)
        - jms-plan-task-breakdown (scans .plans)
        - jms-plan-task-review (scans .plans)
        - jms-plan-execute (scans .plans)
        - jms-plan-code-review (reads from .plans)
        - jms-plan-fix (reads from .plans)
        - jms-plan-summary (reads from .plans)

      For each skill that scans or checks for `.plans/`, add an instruction step early in the skill's workflow that resolves the repository root first. The pattern should be:

        1. Determine the repository root: run `git rev-parse --show-toplevel` to get the absolute path.
        2. Resolve `.plans/` as `<repo-root>/.plans/`.
        3. Use this absolute path for all subsequent `.plans/` references in the skill.

      If `.plans/` genuinely does not exist at the repository root, the skill should report this clearly and suggest running `/jms-plan-init`.
    requirements:

  - id: "TASK-006"
    title: "Create jms-plan-workflow skill for end-to-end pipeline orchestration"
    description: |
      Create a new skill at plugins/jinglemansweep/skills/jms-plan-workflow/SKILL.md that wraps the full planning-to-summary pipeline in a single invocation.

      The workflow orchestrates this sequence:
        1. /jms-plan-init -- ensure .plans directory exists
        2. /jms-plan-phase-new -- create a new phase (or accept existing phase path)
        3. /jms-plan-prd -- generate PRD from prompt.md
        4. /jms-plan-prd-review -- review the PRD
        5. /jms-plan-task-breakdown -- convert PRD to task list
        6. /jms-plan-task-review -- validate the task list
        7. /jms-plan-execute -- execute all tasks
        8. /jms-plan-summary -- generate final summary report

      The skill should:
        - Accept a phase description (for new phase) or existing phase path as input
        - Delegate to individual jms-plan-* skills at each stage using slash commands
        - Handle REVISE verdicts from review stages by re-running the preceding generation step and re-reviewing
        - Handle ESCALATE verdicts by stopping and presenting the issues to the user
        - Provide progress updates between stages (e.g. "Stage 3/8: Generating PRD...")
        - Support resumption if interrupted: check state.yaml to determine which stage was last completed and resume from the next stage
        - Skip stages that already have valid output (e.g. if prd.md exists and prd-review.md shows PASS, skip to task-breakdown)

      SKILL.md structure:
        - YAML frontmatter with name: jms-plan-workflow, description, and allowed-tools: Read, Write, Edit, Bash, Glob, Grep, Task
        - Usage section showing invocation patterns
        - Step-by-step instructions for each pipeline stage
        - Error handling and resumption logic
        - Guidelines section
    requirements:
      - "REQ-004"
    dependencies:
      - "TASK-003"
    suggested_role: "general"
    acceptance_criteria:
      - "plugins/jinglemansweep/skills/jms-plan-workflow/SKILL.md exists"
      - "The skill accepts a phase description or existing phase path as input"
      - "The skill orchestrates all 8 pipeline stages in order, delegating to individual jms-plan-* skills"
      - "The skill handles REVISE verdicts by re-running the preceding generation step"
      - "The skill handles ESCALATE verdicts by stopping and presenting issues to the user"
      - "The skill provides progress updates between stages"
      - "The skill can resume from the last completed stage by checking state.yaml"
      - "The skill has valid YAML frontmatter with name, description, and allowed-tools"
    estimated_complexity: "large"
    files_affected:
      - "plugins/jinglemansweep/skills/jms-plan-workflow/SKILL.md"


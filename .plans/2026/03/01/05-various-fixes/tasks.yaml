  - id: "TASK-016"
    title: "Add requirement interview workflow to jms-plan-prd-review SKILL.md"
    description: |
      Modify `plugins/jinglemansweep/skills/jms-plan-prd-review/SKILL.md` to add a requirement
      interview step. The interview must occur after the coverage assessment (Step 3 in the current
      skill) but before the verdict determination (currently Step 6).

      The interview workflow should:
      1. After reading and assessing the PRD, present each requirement (`REQ-NNN`) to the user
         individually (or in small batches) using the AskUserQuestion tool.
      2. For each requirement, offer three options: Approve (keep as-is), Edit (provide updated text),
         or Remove (delete from the PRD).
      3. If the user chooses Edit, prompt for the updated requirement text and modify `prd.md` accordingly.
      4. If the user chooses Remove, delete the requirement from `prd.md` and renumber subsequent
         requirement IDs to remain sequential (e.g. if REQ-002 is removed, REQ-003 becomes REQ-002).
      5. After all requirements have been reviewed, continue with the existing evaluation and verdict
         logic using the updated requirements.

      Edge case: If the user removes all requirements, warn them and ask for confirmation before
      proceeding with an empty PRD.

      Insert this as a new step (e.g. Step 4: Requirement Interview) and renumber subsequent steps
      accordingly. Keep the existing skill logic intact -- only add the interview step and adjust
      step numbering.
    requirements:
      - "REQ-001"
    dependencies: []
    suggested_role: "skills"
    acceptance_criteria:
      - "SKILL.md contains a Requirement Interview step that presents each REQ-NNN to the user"
      - "The interview step offers approve, edit, and remove options for each requirement"
      - "Edit option includes instructions to modify prd.md with updated text"

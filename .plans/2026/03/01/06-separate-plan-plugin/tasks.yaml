    description: |
      Modify plugins/jplan/skills/jp-plan-execute/SKILL.md to add a quality gate check after the review-fix loop completes and before offering PR creation (currently Step 10).

      Insert a new step between the review-fix loop exit and the PR offer:
      1. After the review-fix loop exits, run /jp-plan-task-validate against all files created or modified during the phase.
      2. If validation returns PASS, proceed to offer PR creation normally.
      3. If validation returns FAIL:

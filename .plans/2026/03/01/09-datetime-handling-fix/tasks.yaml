  - id: "TASK-002"
    title: "Add timestamp shell-command instructions to jp-execute skill"
    description: |
      The jp-execute/SKILL.md uses <ISO 8601 timestamp> placeholders throughout without specifying
      how to obtain the actual time. The LLM fabricates plausible-looking but incorrect timestamps.

      Add a new subsection between the current "## Instructions" heading and "### Step 0" titled
      something like "### Timestamp Convention" or a prominent note block. The instruction must state:

      1. Every <ISO 8601 timestamp> in this skill MUST be obtained by running:
         date -u +"%Y-%m-%dT%H:%M:%SZ"
         via the Bash tool and using the returned value verbatim.
      2. NEVER generate, estimate, or fabricate timestamp values. Always use the shell command.
      3. For started_at: run the date command when the event begins and store the result.
      4. For finished_at: run the date command when the event completes and store the result.

      Additionally, update each YAML template block that contains <ISO 8601 timestamp> to include
      a brief inline comment referencing the timestamp convention (e.g. "# see Timestamp Convention").

      Also update the task log template in Step 5g to make explicit that:
      - The "Started" field uses the started_at value captured in Step 5c via shell command.
      - The "Finished" field uses a fresh shell command output at the time the log is written.
    requirements:
      - "REQ-010"
      - "REQ-012"
      - "REQ-014"
    dependencies: []
    suggested_role: "skills"
    acceptance_criteria:
      - "A Timestamp Convention instruction exists in jp-execute/SKILL.md before the first timestamp usage"
      - "The instruction specifies date -u +\"%Y-%m-%dT%H:%M:%SZ\" as the required command"
      - "The instruction explicitly prohibits generating, estimating, or fabricating timestamps"
      - "Each YAML template block containing <ISO 8601 timestamp> includes a reference to the convention"
      - "Step 5g task log template instructions clarify that Started comes from Step 5c and Finished from a fresh shell command"
    estimated_complexity: "medium"
    files_affected:
      - "plugins/jplan/skills/jp-execute/SKILL.md"


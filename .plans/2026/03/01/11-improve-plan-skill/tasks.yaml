  - id: "TASK-002"
    title: "Write prompt ingestion, review, interview, and update steps"
    description: >
      Add four new steps to plugins/jplan/skills/jp-plan/SKILL.md, inserted
      immediately after the current Step 6 (Create Prompt File) and before the
      current Step 7 (Initialize State File). These new steps implement the core
      prompt review functionality. Use the same Markdown heading style and
      formatting conventions as the existing steps.


      **New Step 7: Prompt Ingestion** (REQ-001)

      After creating prompt.md (Step 6), use AskUserQuestion to ask the user to
      confirm they have finished writing their prompt content. Present two options:
      (1) "I've finished editing prompt.md" (recommended), (2) "Skip prompt review".
      If the user chooses to skip, jump directly to the state file step (new Step 11).
      If the user confirms, read the full contents of prompt.md into context using
      the Read tool.


      **New Step 8: High-Level Prompt Review** (REQ-002, REQ-006)

      Perform a lightweight scan of the ingested prompt.md content. Check each
      section (Overview, Goals, Requirements, Constraints, Out of Scope, References)
      for: (a) sections that are entirely empty or contain only the HTML comment
      placeholder, (b) obvious contradictions between sections (e.g. a goal that
      conflicts with an out-of-scope item). Do NOT perform deep requirements
      analysis, suggest additional requirements, or question the user's technical
      decisions. Build a list of identified gaps (if any). If no gaps are found,
      skip Steps 9 and 10 and proceed to Step 11 with a brief note that the prompt
      looks complete.


      **New Step 9: Interactive Interview** (REQ-003, REQ-006)

      If gaps were identified in Step 8, present them to the user as a brief
      interview using AskUserQuestion. Group all gaps into a single interaction
      where possible (1-3 questions, never more than 5). Each question should be
      clear and concise, identifying what is missing and asking the user to provide
      the content or explicitly dismiss the gap (e.g. "intentionally left blank").
      The entire interview should complete in one round of questions and one round
      of answers.


      **New Step 10: Update prompt.md** (REQ-004)

      If the user provided content for any gaps during the interview, use the Edit
      tool to update prompt.md in place. Replace the HTML comment placeholders in
      the relevant sections with the user's responses. Preserve all existing
      user-written content — only fill gaps or apply corrections. Maintain the same
      Markdown structure and heading hierarchy. If the user dismissed all gaps
      (nothing to change), do not modify prompt.md and note this in the Step 12
      report.
    requirements:
      - "REQ-001"
      - "REQ-002"
      - "REQ-003"
      - "REQ-004"
      - "REQ-006"
    dependencies:
      - "TASK-001"
    suggested_role: "skills"
    acceptance_criteria:
      - "Step 7 uses AskUserQuestion to wait for the user to confirm prompt editing is complete"
      - "Step 7 includes a skip option that bypasses the review entirely"
      - "Step 8 checks each template section for empty/placeholder-only content"
      - "Step 8 checks for obvious contradictions between sections"
      - "Step 8 explicitly prohibits deep requirements analysis"
      - "Step 9 presents gaps as a single AskUserQuestion interaction with 1-5 questions"
      - "Step 9 allows the user to dismiss gaps"
      - "Step 10 uses Edit tool to update prompt.md in place"
      - "Step 10 preserves existing user content and Markdown structure"
      - "Step 10 skips file modification if the user dismissed all gaps"
      - "All four steps follow the existing heading style (### Step N: Title)"
    estimated_complexity: "medium"
    files_affected:
      - "plugins/jplan/skills/jp-plan/SKILL.md"


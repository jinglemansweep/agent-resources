  - id: "TASK-003"
    status: "done"
    title: "Write stage descriptions for setup, plan, and PRD generation"
    description: |
      Within the tutorial section in README.md, add a "### Step-by-Step Walkthrough" subsection
      (or similar heading) after the Pipeline Overview. Under it, write detailed descriptions for
      the first three pipeline stages. Each stage should be a #### heading.

      #### Stage 1: Initialize the Plans Directory (`/jp-setup`)
      - Command: `/jp-setup`
      - What it does: Creates the `.plans/` directory at the repository root if it does not exist.
        This is a one-time setup step per project.
      - Output: `.plans/` directory created
      - User interaction: None — just run the command.

      #### Stage 2: Create a Planning Phase (`/jp-plan`)
      - Command: `/jp-plan <short-description>` (e.g. `/jp-plan auth-refactor`)
      - What it does: Creates a new datestamped phase directory under `.plans/YYYY/MM/DD/NN-slug/`,
        creates a git branch (e.g. `feat/NN-slug`), and opens an interactive prompt session where
        the user describes what they want to build. The skill reviews the prompt for completeness
        and may ask clarifying questions to fill gaps. The result is saved as `prompt.md`.
      - Output: Phase directory created with `prompt.md` inside it; git branch created
      - User interaction: The user writes or dictates their requirements. The skill may ask
        follow-up questions to resolve gaps in the prompt.

      #### Stage 3: Generate the PRD (`/jp-prd`)
      - Command: `/jp-prd <phase-path>` (e.g. `/jp-prd .plans/2026/03/01/01-auth-refactor`)
      - What it does: Reads `prompt.md` and generates a structured Product Requirements Document
        with numbered requirements (REQ-001, REQ-002, ...), acceptance criteria, technical
        constraints, and scope boundaries.
      - Output: `prd.md` in the phase directory
      - User interaction: None — the PRD is generated automatically from the prompt.

      Use inline code for all commands, file names, and paths. Use consistent formatting across
      all stage descriptions.
    requirements:
      - "REQ-001"
      - "REQ-002"
    dependencies:
      - "TASK-002"
    suggested_role: "docs"
    acceptance_criteria:
      - "Stage descriptions for /jp-setup, /jp-plan, and /jp-prd are present under a walkthrough heading"
      - "Each stage includes the slash command syntax with example arguments where applicable"
      - "Each stage names the artifact(s) produced"
      - "Each stage explains what user interaction is required (or states none)"
      - "Formatting is consistent across all three stages"
    estimated_complexity: "medium"
    files_affected:
      - "README.md"

  - id: "TASK-004"
    title: "Write stage descriptions for PRD review, task list, and task review"
    description: |
      Continue the step-by-step walkthrough in README.md with the next three pipeline stages.

      #### Stage 4: Review the PRD (`/jp-prd-review`)
      - Command: `/jp-prd-review <phase-path>`
      - What it does: Critically evaluates the PRD against the original prompt for coverage gaps,
        contradictions, ambiguity, and feasibility. Produces a review with a verdict.
      - Output: `reviews/prd.md` in the phase directory
      - Review verdicts: Explain the three possible outcomes:
        - **PASS** — The PRD is approved and ready for task breakdown
        - **REVISE** — Issues were found; the PRD is automatically revised and re-reviewed (up to a
          retry limit)
        - **ESCALATE** — Fundamental issues require user input before proceeding
      - User interaction: If the verdict is PASS or REVISE, no action needed. If ESCALATE, the user
        must address the raised concerns and re-run the review.

      #### Stage 5: Generate the Task List (`/jp-task-list`)
      - Command: `/jp-task-list <phase-path>`
      - What it does: Reads the approved PRD and converts it into a structured YAML task list. Each
        task has an ID (TASK-001, TASK-002, ...), description, dependencies, a suggested role, and
        acceptance criteria. Tasks are topologically sorted by dependency.
      - Output: `tasks.yaml` in the phase directory
      - User interaction: None — the task list is generated automatically.

      #### Stage 6: Validate the Task List (`/jp-task-review`)
      - Command: `/jp-task-review <phase-path>`
      - What it does: Validates the task list for structural correctness, dependency ordering, and
        complete PRD requirement coverage. Uses the same PASS/REVISE/ESCALATE verdict system as the
        PRD review.
      - Output: `reviews/tasks.md` in the phase directory
      - User interaction: Same as PRD review — no action unless ESCALATE.

      The review verdict explanation (PASS/REVISE/ESCALATE) should be presented clearly, potentially
      as a small list or callout, since it applies to both /jp-prd-review and /jp-task-review. It is
      fine to explain it once in the PRD review stage and reference it from the task review stage.
    requirements:
      - "REQ-001"
      - "REQ-002"
      - "REQ-007"
    dependencies:
      - "TASK-003"
    suggested_role: "docs"
    acceptance_criteria:
      - "Stage descriptions for /jp-prd-review, /jp-task-list, and /jp-task-review are present"
      - "The three review verdicts (PASS, REVISE, ESCALATE) are named and defined"
      - "It is clear that REVISE triggers automatic retry and ESCALATE requires user input"
      - "Each stage includes command syntax, artifacts produced, and user interaction notes"
    estimated_complexity: "medium"
    files_affected:
      - "README.md"

  - id: "TASK-005"
    title: "Write stage descriptions for execution and summary"
    description: |
      Continue the step-by-step walkthrough in README.md with the final two pipeline stages.

      #### Stage 7: Execute the Tasks (`/jp-execute`)
      - Command: `/jp-execute <phase-path>`
      - What it does: The main orchestrator. Processes tasks sequentially in dependency order.
        For each task, it delegates to the `jp-worker-dev` agent, which examines task signals
        (file extensions, tools, frameworks) to automatically load the appropriate domain skill.
        After each task, it runs validation checks (`/jp-task-validate`), performs code review
        (`/jp-codereview`), and applies fixes for critical and major issues (`/jp-codereview-fix`).
      - Output: Modified project files as specified by tasks; `changelog.md` (append-only execution
        log); `state.yaml` (execution state for resumability); review artifacts in `reviews/`
      - User interaction: The execution runs autonomously. If a task fails validation or exceeds
        retry limits, the orchestrator may pause for user input.

      Include a brief explanation of domain roles at this point:

      > **Domain roles:** During execution, the developer agent automatically loads domain-specific
      > skills based on what each task involves. For example, a Python implementation task loads
      > `role-python`, a Docker task loads `role-devops`, and a documentation task loads `role-docs`.
      > Available domain roles: `role-python`, `role-nodejs`, `role-frontend`, `role-devops`,
      > `role-docs`, `role-agent-skills`. These are not invoked manually — the agent selects them
      > based on task context.

      #### Stage 8: Generate the Summary (`/jp-summary`)
      - Command: `/jp-summary <phase-path>`
      - What it does: Generates a final report summarizing all completed tasks, review findings,
        fixes applied, and decisions made during the pipeline run.
      - Output: `summary.md` in the phase directory
      - User interaction: None — the summary is generated automatically.
    requirements:
      - "REQ-001"
      - "REQ-002"
      - "REQ-006"
    dependencies:
      - "TASK-004"
    suggested_role: "docs"
    acceptance_criteria:
      - "Stage descriptions for /jp-execute and /jp-summary are present"
      - "The execution stage explains the delegation to jp-worker-dev and the validate-review-fix loop"
      - "Domain roles are explained as automatic and not user-invoked, with the list of available roles"
      - "Each stage includes command syntax, artifacts produced, and user interaction notes"
    estimated_complexity: "medium"
    files_affected:
      - "README.md"

